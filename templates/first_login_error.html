<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Invalid Link | Academic Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Public Sans', sans-serif; }</style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
  <div class="bg-white border border-red-100 rounded-xl shadow-sm p-10 max-w-md w-full text-center">
    <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5">
      <svg class="w-7 h-7 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-slate-800 mb-2">Link Invalid or Expired</h1>
    <p class="text-sm text-slate-500 mb-6">{{ reason }}</p>
    <a href="/" class="inline-block bg-slate-900 text-white text-sm font-semibold px-6 py-2.5 rounded-lg hover:bg-slate-700 transition">
      Back to Login
    </a>
  </div>

</html>
